spring.application.name=notifyflow

notifyflow.scheduler.batch-size=50
notifyflow.scheduler.fixed-delay-ms=5000
notifyflow.recovery.fixed-delay-ms=60000
notifyflow.recovery.stale-threshold-minutes=10
notifyflow.recovery.batch-size=50

#Email provider
notifyflow.email.provider=logging

#DB
spring.datasource.url=jdbc:postgresql://localhost:5433/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=8081

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

# Set to smtp to enable real email delivery
# notifyflow.email.provider=smtp
# notifyflow.email.smtp.from=noreply@notifyflow.com
# spring.mail.host=smtp.example.com
# spring.mail.port=587
# spring.mail.username=<username>
# spring.mail.password=<password>
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
