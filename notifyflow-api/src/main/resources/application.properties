spring.application.name=notifyflow
server.port=8081

#Scheduler
notifyflow.scheduler.batch-size=50
notifyflow.scheduler.fixed-delay-ms=5000
notifyflow.recovery.fixed-delay-ms=60000
notifyflow.recovery.stale-threshold-minutes=10
notifyflow.recovery.batch-size=50

# API Authentication
notifyflow.api.enabled=${NOTIFYFLOW_API_ENABLED:false}
notifyflow.api.key=${NOTIFYFLOW_API_KEY:local-dev-key}

#Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.server.port=8082
management.server.address=127.0.0.1
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.info.enabled=true
management.info.env.enabled=false
management.info.java.enabled=false
management.info.os.enabled=false


#DB
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

notifyflow.email.provider=${NOTIFYFLOW_EMAIL_PROVIDER:logging}
notifyflow.email.smtp.from=${NOTIFYFLOW_EMAIL_FROM:}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}

spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
