openapi: 3.0.3
info:
  title: NotifyFlow API
  description: Notification & Event Processing Platform
  version: 1.0.0
  contact:
    name: NotifyFlow Team
    url: https://github.com/AndriiSynytsia/NotifyFlow

servers:
  - url: http://localhost:8081/api/v1
    description: Development server

paths:
  /notifications:
    post:
      summary: Create a new notification
      operationId: createNotification
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationCreateRequest'
            examples:
              email_notification:
                summary: Email notification example
                value:
                  recipient: "user@example.com"
                  type: "EMAIL"
                  subject: "Welcome to NotifyFlow"
                  message: "Thank you for joining our platform!"
                  scheduledAt: "2025-12-25T10:00:00Z"
              sms_notification:
                summary: SMS notification example
                value:
                  recipient: "+1234567890"
                  type: "SMS"
                  subject: "Alert"
                  message: "Your order has been shipped"
                  scheduledAt: "2025-12-25T15:30:00Z"
      responses:
        '201':
          description: Notification created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get all notifications
      operationId: getAllNotifications
      tags:
        - Notifications
      parameters:
        - name: status
          in: query
          description: Filter by notification status
          required: false
          schema:
            $ref: '#/components/schemas/NotificationStatus'
        - name: page
          in: query
          description: Page number (0-based)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          description: Sort criteria (e.g., scheduledAt,asc)
          required: false
          schema:
            type: string
            default: "createdAt,desc"
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'

  /notifications/{id}:
    get:
      summary: Get notification by ID
      operationId: getNotificationById
      tags:
        - Notifications
      parameters:
        - name: id
          in: path
          description: Notification ID
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Notification details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/attempts:
    get:
      summary: Get delivery attempts for a notification
      operationId: getNotificationAttempts
      tags:
        - Notifications
      parameters:
        - name: id
          in: path
          description: Notification ID
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: List of delivery attempts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryAttemptResponse'
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    NotificationCreateRequest:
      type: object
      required:
        - recipient
        - type
        - subject
        - message
        - scheduledAt
      properties:
        recipient:
          type: string
          format: email
          description: Recipient email address or phone number
          example: "user@example.com"
        type:
          $ref: '#/components/schemas/NotificationType'
        subject:
          type: string
          minLength: 1
          maxLength: 255
          description: Notification subject
          example: "Welcome to NotifyFlow"
        message:
          type: string
          minLength: 1
          maxLength: 5000
          description: Notification message body
          example: "Thank you for joining our platform!"
        scheduledAt:
          type: string
          format: date-time
          description: When the notification should be sent (ISO 8601 format)
          example: "2025-12-25T10:00:00Z"

    NotificationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Notification ID
          example: 1
        recipient:
          type: string
          description: Recipient address
          example: "user@example.com"
        type:
          $ref: '#/components/schemas/NotificationType'
        subject:
          type: string
          description: Notification subject
          example: "Welcome to NotifyFlow"
        message:
          type: string
          description: Notification message body
          example: "Thank you for joining our platform!"
        status:
          $ref: '#/components/schemas/NotificationStatus'
        scheduledAt:
          type: string
          format: date-time
          description: Scheduled delivery time
          example: "2025-12-25T10:00:00Z"
        sentAt:
          type: string
          format: date-time
          nullable: true
          description: Actual delivery time (null if not sent yet)
          example: "2025-12-25T10:01:30Z"
        retryCount:
          type: integer
          description: Current number of retry attempts
          example: 0
        maxRetries:
          type: integer
          description: Maximum allowed retries
          example: 3
        failureReason:
          type: string
          nullable: true
          description: Reason for failure (null if not failed)
          example: "SMTP server unavailable"
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2025-12-24T15:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2025-12-24T15:30:00Z"

    DeliveryAttemptResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Attempt ID
          example: 1
        attemptNumber:
          type: integer
          description: Attempt sequence number
          example: 1
        status:
          $ref: '#/components/schemas/DeliveryAttemptStatus'
        failureReason:
          type: string
          nullable: true
          description: Failure reason (null if successful)
          example: "Connection timeout"
        startedAt:
          type: string
          format: date-time
          description: When the attempt started
          example: "2025-12-25T10:00:00Z"
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: When the attempt completed (null if still running)
          example: "2025-12-25T10:00:30Z"

    NotificationPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
        totalElements:
          type: integer
          format: int64
          description: Total number of notifications
          example: 150
        totalPages:
          type: integer
          description: Total number of pages
          example: 8
        size:
          type: integer
          description: Page size
          example: 20
        number:
          type: integer
          description: Current page number (0-based)
          example: 0
        first:
          type: boolean
          description: Whether this is the first page
          example: true
        last:
          type: boolean
          description: Whether this is the last page
          example: false

    NotificationType:
      type: string
      enum:
        - EMAIL
        - SMS
        - WEBHOOK
      description: Type of notification delivery channel
      example: "EMAIL"

    NotificationStatus:
      type: string
      enum:
        - PENDING
        - QUEUED
        - PROCESSING
        - SENT
        - FAILED
        - CANCELLED
      description: Current status of the notification
      example: "PENDING"

    DeliveryAttemptStatus:
      type: string
      enum:
        - STARTED
        - SUCCEEDED
        - FAILED
      description: Status of a delivery attempt
      example: "SUCCEEDED"

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: "2025-12-25T10:00:00Z"
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Error type
          example: "Bad Request"
        message:
          type: string
          description: Error message
          example: "Validation failed for field 'recipient'"
        path:
          type: string
          description: Request path
          example: "/api/v1/notifications"

tags:
  - name: Notifications
    description: Notification management operations
